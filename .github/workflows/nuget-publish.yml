name: nuget-publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# 关键修改 1：必须提升权限以允许读取 ID Token（用于 OIDC 认证）
permissions:
  contents: read
  id-token: write 

jobs:
  publish:
    runs-on: windows-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\SharpImageConvert.slnx

      - name: Test
        run: dotnet test .\SharpImageConvert.slnx -c Release --no-restore

      - name: Pack
        run: dotnet pack .\src\SharpImageConverter.csproj -c Release -o .\artifacts\nuget

      # 关键修改 2：登录到 NuGet.org 以换取短期 API Key
      # 请将下面的 '你的_NUGET_用户名' 替换为您在 nuget.org 上的实际用户名
      - name: NuGet Login
        uses: NuGet/login@v1
        id: login
        with:
          user: 'LastOneSky'

      # 关键修改 3：发布时不再使用环境变量 $env:NUGET_API_KEY，
      # NuGet/login 插件会自动在环境中配置好临时 Key，可以直接推送，或者使用其输出的密钥
      - name: Push (nupkg & snupkg)
        shell: pwsh
        run: |
          dotnet nuget push .\artifacts\nuget\*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{steps.login.outputs.NUGET_API_KEY}} --skip-duplicate